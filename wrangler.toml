name = "discord-companion-bot"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[durable_objects.bindings]]
name = "COMPANION_BOT"
class_name = "CompanionBot"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CompanionBot"]

[triggers]
crons = ["* * * * *"]

[vars]
WATCH_CHANNELS = "1450789790906712066,1462682277980016742"

# Secrets (set via `wrangler secret put`):
# - DISCORD_TOKEN: Bot token
# - WEBHOOK_URL: Discord webhook URL
# - DISCORD_CLIENT_ID: OAuth2 application ID
# - DISCORD_CLIENT_SECRET: OAuth2 client secret
# - ADMIN_DISCORD_ID: Admin's Discord user ID
